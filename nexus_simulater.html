<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NexusCoin App – Mining & Vault</title>
<style>
body{font-family:Arial,sans-serif;background:#0f172a;color:white;margin:0;padding:0;}
header{background:#1e293b;padding:20px;text-align:center;}
header h1{color:#22c55e;margin:0;}
nav{display:flex;justify-content:center;background:#111827;}
nav button{flex:1;padding:15px;font-size:16px;background:#1e293b;color:white;border:none;cursor:pointer;}
nav button:hover{background:#22c55e;}
nav button.active{background:#065f46;}
.page{display:none;padding:30px;text-align:center;}
.container{max-width:600px;margin:auto;background:#1e293b;padding:30px;border-radius:12px;box-shadow:0 0 25px rgba(0,255,150,0.2);}
input,select,button{width:90%;padding:12px;margin:10px;border-radius:6px;border:none;font-size:16px;}
button{background:#22c55e;color:white;cursor:pointer;}
button:hover{background:#16a34a;}
.result{margin-top:20px;font-size:16px;}
.orb{width:80px;height:80px;border-radius:50%;margin:20px auto;background:radial-gradient(circle,#22c55e,#065f46);animation:pulse 2s infinite;}
@keyframes pulse{0%{transform:scale(1);opacity:0.8;}50%{transform:scale(1.2);opacity:1;}100%{transform:scale(1);opacity:0.8;}}
</style>
</head>
<body>

<header><h1>NexusCoin Sandbox App</h1></header>

<nav>
<button id="miningTab" class="active" onclick="showPage('mining')">Mining</button>
<button id="vaultTab" onclick="showPage('vault')">Vault</button>
</nav>

<!-- Mining Page -->
<div id="mining" class="page" style="display:block;">
<div class="container">
<h2>Mine NexusCoins</h2>
<div class="orb"></div>
<p>Simulate earning NexusCoins from Waste or Energy Actions</p>
<select id="actionType">
  <option value="plastic">Recycle Plastic (1kg → 5 NX)</option>
  <option value="biodegradable">Compost Biodegradable (1kg → 10 NX)</option>
  <option value="energy">Human Activity (30 min → 2 NX)</option>
</select>
<input type="number" id="amount" placeholder="Enter weight / units">
<button onclick="mineNexus()">Mine NexusCoin</button>
<div class="result" id="mineResult">Your mined NexusCoins will appear here.</div>
</div>
</div>

<!-- Vault Page -->
<div id="vault" class="page">
<div class="container">
<h2>Vault & Market Value</h2>
<div class="orb"></div>
<p><b>Secure Vault</b> – See your NexusCoin balance and real market value</p>
<input type="password" id="vaultCode" placeholder="Enter vault security code">
<button onclick="checkVault()">Check Vault Balance</button>
<button onclick="updateMarket()">Show Market Value (USD, ETH, KES)</button>
<div class="result" id="vaultResult">Values will appear here.</div>
</div>
</div>

<script>
// ===== Navigation =====
function showPage(page) {
  document.getElementById("mining").style.display = page==='mining'?'block':'none';
  document.getElementById("vault").style.display = page==='vault'?'block':'none';
  document.getElementById("miningTab").classList.toggle("active", page==='mining');
  document.getElementById("vaultTab").classList.toggle("active", page==='vault');
}

// ===== Vault Setup =====
const vaultSecurityCode = "Nx$2026Vault!Secure";
const vaultKey = "nexusSafeVault";

// ===== Mining Logic =====
const rewardTable = {plastic:5,biodegradable:10,energy:2};
function mineNexus(){
  const action = document.getElementById("actionType").value;
  const amount = parseFloat(document.getElementById("amount").value);
  if(isNaN(amount)||amount<=0){alert("Enter valid amount.");return;}
  const reward = rewardTable[action]*amount;
  let current = parseFloat(localStorage.getItem(vaultKey))||0;
  current += reward;
  localStorage.setItem(vaultKey,current);
  document.getElementById("mineResult").innerHTML=
    `✅ You earned ${reward} NexusCoins!<br>💰 Vault Balance: ${current} NX`;
}

// ===== Vault Functions =====
function checkVault(){
  const code = document.getElementById("vaultCode").value;
  if(code!==vaultSecurityCode){alert("❌ Security code incorrect.");return;}
  let current = parseFloat(localStorage.getItem(vaultKey))||0;
  alert(`💰 Vault Balance: ${current} NexusCoin`);
}

async function updateMarket(){
  const code = document.getElementById("vaultCode").value;
  if(code!==vaultSecurityCode){document.getElementById("vaultResult").innerHTML="❌ Enter correct vault code.";return;}
  let nexusBalance = parseFloat(localStorage.getItem(vaultKey))||0;
  if(nexusBalance<=0){document.getElementById("vaultResult").innerHTML="Vault empty.";return;}

  try{
    // Live ETH price
    const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=ethereum&vs_currencies=usd');
    const data = await response.json();
    const ethPriceUSD = data.ethereum.usd;

    const nexusCoinUSD = 0.05;
    const totalUSD = nexusBalance * nexusCoinUSD;
    const totalETH = totalUSD / ethPriceUSD;

    // USD -> KES
    const rateResponse = await fetch('https://api.exchangerate.host/convert?from=USD&to=KES');
    const rateData = await rateResponse.json();
    const usdToKes = rateData.result;
    const totalKES = totalUSD * usdToKes;

    document.getElementById("vaultResult").innerHTML=
      `🔐 Vault NexusCoin: ${nexusBalance}<br>`+
      `💰 Value in USD: $${totalUSD.toFixed(2)}<br>`+
      `Ξ Equivalent in ETH: ${totalETH.toFixed(6)} ETH<br>`+
      `₭ Equivalent in KES: KES ${totalKES.toFixed(2)}`;
  } catch(err){
    document.getElementById("vaultResult").innerHTML="Unable to fetch market data.";
  }
}
</script>

</body>
</html>
